<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>答题 · 科研动物图鉴</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- 数据与算法 -->
  <script src="js/questions.js"></script>
  <script src="js/calculator.js"></script>
  <style>
    /* 答题页特有样式 */
    .test-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1.2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .progress-wrapper {
      margin-bottom: 2rem;
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #7f8c8d;
      margin-bottom: 0.5rem;
    }
    .progress-bar-bg {
      height: 6px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #2c3e50;
      width: 0%;
      transition: width 0.2s ease;
    }
    .question-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .question-text {
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1.5;
      color: #2c3e50;
      margin-bottom: 2.5rem;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .option-btn {
      background: white;
      border: 1.5px solid #d5d8dc;
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
      font-size: 1.05rem;
      line-height: 1.4;
      color: #2c3e50;
      text-align: left;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .option-btn:active {
      background: #f8f9fa;
      border-color: #2c3e50;
      transform: scale(0.99);
    }
    .question-meta {
      color: #95a5a6;
      font-size: 0.8rem;
      margin-top: 2rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="test-container" v-if="currentQuestion">
      <div class="progress-wrapper">
        <div class="progress-text">
          <span>探路者 · 发现你的科研基因</span>
          <span>{{ currentIndex + 1 }} / {{ questions.length }}</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" :style="{ width: progress + '%' }"></div>
        </div>
      </div>

      <div class="question-box">
        <div class="question-text">{{ currentQuestion.text }}</div>
        <div class="options">
          <button class="option-btn" @click="selectOption('A')">{{ currentQuestion.optionA }}</button>
          <button class="option-btn" @click="selectOption('B')">{{ currentQuestion.optionB }}</button>
          <!-- 处理多选题（题21、22）的特殊情况 -->
          <template v-if="currentQuestion.id === 21 || currentQuestion.id === 22">
            <button class="option-btn" @click="selectOption('C')" v-if="currentQuestion.optionC">{{ currentQuestion.optionC }}</button>
            <button class="option-btn" @click="selectOption('D')" v-if="currentQuestion.optionD">{{ currentQuestion.optionD }}</button>
          </template>
        </div>
      </div>

      <div class="question-meta">第 {{ currentIndex + 1 }} 题 · 跟随直觉选择</div>
    </div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue;

    const app = createApp({
      setup() {
        const questionsRef = ref(questions);
        const currentIndex = ref(0);
        const answers = ref(new Array(questions.length).fill(null));

        const currentQuestion = computed(() => questionsRef.value[currentIndex.value]);
        const progress = computed(() => ((currentIndex.value + 1) / questionsRef.value.length) * 100);

        function selectOption(opt) {
          // 保存答案
          answers.value[currentIndex.value] = opt;

          // 是否最后一题
          if (currentIndex.value === questionsRef.value.length - 1) {
            // 完成答题，计算结果
            const result = calculateResult(questionsRef.value, answers.value);
            // 存储到 localStorage
            localStorage.setItem('testResult', JSON.stringify(result));
            localStorage.setItem('testAnswers', JSON.stringify(answers.value));
            // 跳转结果页
            window.location.href = 'result.html';
          } else {
            // 下一题
            currentIndex.value++;
          }
        }

        // 如果意外刷新，可以从缓存恢复进度（可选）
        const savedAnswers = localStorage.getItem('testAnswers');
        if (savedAnswers) {
          try {
            const parsed = JSON.parse(savedAnswers);
            // 找到第一个未回答的索引
            const firstNull = parsed.findIndex(a => a === null);
            if (firstNull !== -1) {
              currentIndex.value = firstNull;
              answers.value = parsed;
            } else {
              // 全部答完了？不应该进入此页，跳结果
              window.location.href = 'result.html';
            }
          } catch(e) {
            localStorage.removeItem('testAnswers');
          }
        }

        return {
          questions: questionsRef,
          currentIndex,
          answers,
          currentQuestion,
          progress,
          selectOption
        };
      }
    });

    app.mount('#app');
  </script>
</body>
</html>
